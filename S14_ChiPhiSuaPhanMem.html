<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biểu đồ Chi phí sửa lỗi (Cost of Defect)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts (Thư viện vẽ biểu đồ cho React) - Cố định phiên bản 2.1.12 để tránh lỗi undefined -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, ReferenceLine } = window.Recharts;

        // Dữ liệu mô phỏng sự gia tăng chi phí (Mức độ tương đối)
        // 1x ở Requirement -> 100x ở Release (Theo nghiên cứu thực tế của IBM)
        const data = [
            {
                stage: '1. Requirement',
                name: 'Giai đoạn Yêu cầu',
                costMultiplier: 1,
                costText: '1x',
                color: '#10b981', // Emerald - An toàn
                desc: 'Phát hiện sai sót ngay trên giấy. Chỉ cần mở file Word/Excel ra sửa lại text.',
                action: 'BA và Khách hàng chốt lại.'
            },
            {
                stage: '2. Design',
                name: 'Giai đoạn Thiết kế',
                costMultiplier: 5,
                costText: '5x',
                color: '#3b82f6', // Blue
                desc: 'Phải vẽ lại bản thiết kế (Figma), sơ đồ database, sửa lại kiến trúc hệ thống.',
                action: 'Designer, Architect phải làm lại.'
            },
            {
                stage: '3. Coding',
                name: 'Giai đoạn Lập trình',
                costMultiplier: 10,
                costText: '10x',
                color: '#eab308', // Yellow
                desc: 'Developer đã viết code xong. Giờ phải xóa đi viết lại, ảnh hưởng đến các hàm khác.',
                action: 'Developer tốn thời gian sửa code.'
            },
            {
                stage: '4. Testing',
                name: 'Giai đoạn Kiểm thử',
                costMultiplier: 15,
                costText: '15x',
                color: '#f97316', // Orange
                desc: 'Tester tìm ra lỗi. Báo lại cho Dev sửa -> Tester phải test lại (Regression Test).',
                action: 'Tốn nỗ lực của cả team Dev & QA.'
            },
            {
                stage: '5. Release/Production',
                name: 'Sản phẩm đã ra mắt',
                costMultiplier: 100,
                costText: '100x+',
                color: '#ef4444', // Red - Nguy hiểm
                desc: 'Khách hàng gặp lỗi, hệ thống sập, mất tiền, lộ dữ liệu, mất uy tín. Phải hotfix khẩn cấp trong đêm.',
                action: 'Thiệt hại kinh doanh, đền bù hợp đồng.'
            }
        ];

        // Custom Tooltip khi hover vào cột
        const CustomTooltip = ({ active, payload }) => {
            if (active && payload && payload.length) {
                const data = payload[0].payload;
                return (
                    <div className="bg-white p-4 border-2 shadow-xl rounded-xl max-w-sm z-50" style={{ borderColor: data.color }}>
                        <h3 className="font-bold text-lg mb-2" style={{ color: data.color }}>{data.name}</h3>
                        <div className="flex items-center gap-2 mb-3">
                            <span className="text-slate-500 text-sm">Chi phí sửa lỗi:</span>
                            <span className="font-extrabold text-xl px-2 py-1 rounded bg-slate-100" style={{ color: data.color }}>
                                Tăng {data.costText}
                            </span>
                        </div>
                        <p className="text-sm text-slate-700 mb-2 leading-relaxed">
                            <strong>Thực tế:</strong> {data.desc}
                        </p>
                        <p className="text-xs text-slate-500 italic border-t pt-2 mt-2">
                            {data.action}
                        </p>
                    </div>
                );
            }
            return null;
        };

        function App() {
            return (
                <div className="bg-white p-8 rounded-2xl shadow-xl w-full">
                    
                    <div className="text-center mb-8">
                        <h1 className="text-3xl font-extrabold text-slate-800 uppercase tracking-wide mb-2">
                            Biểu đồ: Quy luật <span className="text-red-500">"Quả Cầu Tuyết"</span> trong Sửa Lỗi
                        </h1>
                        <p className="text-slate-500 text-lg">
                            Tại sao việc Review Requirement kỹ lưỡng lại giúp công ty tiết kiệm hàng tỷ đồng?
                        </p>
                    </div>

                    <div className="h-[450px] w-full">
                        <ResponsiveContainer width="100%" height="100%">
                            <BarChart
                                data={data}
                                margin={{ top: 20, right: 30, left: 20, bottom: 40 }}
                            >
                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                <XAxis 
                                    dataKey="stage" 
                                    tick={{ fill: '#475569', fontSize: 13, fontWeight: 'bold' }}
                                    axisLine={{ stroke: '#cbd5e1' }}
                                    tickLine={false}
                                    dy={10}
                                />
                                <YAxis 
                                    label={{ value: 'Mức độ Tốn kém (Cost Multiplier)', angle: -90, position: 'insideLeft', offset: -5, fill: '#64748b' }}
                                    tick={{ fill: '#64748b' }}
                                    axisLine={false}
                                    tickLine={false}
                                    domain={[0, 110]}
                                />
                                <Tooltip content={<CustomTooltip />} cursor={{ fill: '#f8fafc' }} />
                                
                                {/* Đường nét đứt cảnh báo ranh giới nguy hiểm */}
                                <ReferenceLine y={20} stroke="#ef4444" strokeDasharray="5 5" label={{ position: 'top', value: 'Ranh giới chi phí vượt mức kiểm soát', fill: '#ef4444', fontSize: 12 }} />

                                <Bar 
                                    dataKey="costMultiplier" 
                                    radius={[8, 8, 0, 0]}
                                    animationDuration={1500}
                                >
                                    {data.map((entry, index) => (
                                        <Cell key={`cell-${index}`} fill={entry.color} />
                                    ))}
                                </Bar>
                            </BarChart>
                        </ResponsiveContainer>
                    </div>

                    <div className="mt-8 bg-indigo-50 border-l-4 border-indigo-500 p-5 rounded-r-xl">
                        <h4 className="font-bold text-indigo-900 flex items-center gap-2 mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                            Notes:
                        </h4>
                        <p className="text-indigo-800 text-sm leading-relaxed">
                            "Lỗi (Bug) cũng giống như khối u. Phát hiện ở giai đoạn đầu (Requirement) thì phẫu thuật rất dễ dàng và rẻ (Chỉ sửa file Word). Nhưng nếu để nó lọt đến lúc lên Producttion, nó sẽ di căn, làm phá vỡ toàn bộ cấu trúc dữ liệu, gây phẫn nộ cho User, và chi phí sửa có thể gấp <strong>hàng trăm lần</strong>. Vì vậy, QA/Tester và Dev giỏi không phải là người rình bắt lỗi ở bước Testing, mà là người <strong>chặn lỗi ngay từ khi đọc tài liệu!</strong>"
                        </p>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

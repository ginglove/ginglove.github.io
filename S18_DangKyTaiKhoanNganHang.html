<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký mở tài khoản ngân hàng trực tuyến</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .required::after {
            content: " *";
            color: red;
        }
        input[type="text"], input[type="date"], input[type="number"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            height: 80px;
        }
        .error-message {
            color: #d9534f;
            font-size: 0.85em;
            margin-top: 5px;
            display: none;
        }
        .input-error {
            border-color: #d9534f !important;
            background-color: #fdf2f2;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
        .checkbox-group input {
            margin-top: 3px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mở tài khoản trực tuyến</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label class="required" for="fullName">Họ tên khách hàng</label>
            <input type="text" id="fullName" maxlength="50" placeholder="Nhập họ và tên">
            <div class="error-message" id="error-fullName">Họ tên không được để trống.</div>
        </div>

        <div class="form-group">
            <label class="required" for="dob">Ngày sinh</label>
            <input type="date" id="dob">
            <div class="error-message" id="error-dob">Vui lòng chọn ngày sinh.</div>
        </div>

        <div class="form-group">
            <label class="required" for="address">Địa chỉ</label>
            <textarea id="address" minlength="10" maxlength="255" placeholder="Nhập địa chỉ cụ thể"></textarea>
            <div class="error-message" id="error-address">Vui lòng nhập địa chỉ cụ thể (tối thiểu 10 ký tự).</div>
        </div>

        <div class="form-group">
            <label class="required" for="phone">Số điện thoại</label>
            <input type="text" id="phone" maxlength="10" placeholder="Nhập số điện thoại 10 số">
            <div class="error-message" id="error-phone">Số điện thoại không hợp lệ.</div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Nhập email (không bắt buộc)">
            <div class="error-message" id="error-email">Định dạng email không chính xác.</div>
        </div>

        <div class="form-group">
            <label class="required" for="cccd">Căn cước công dân</label>
            <input type="text" id="cccd" maxlength="10" placeholder="Nhập đúng 10 số CCCD">
            <div class="error-message" id="error-cccd">CCCD phải đủ 10 số.</div>
        </div>

        <div class="form-group">
            <label for="referrer">Người giới thiệu</label>
            <input type="text" id="referrer" placeholder="Mã nhân viên hoặc SĐT (không bắt buộc)">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms">
            <label for="terms">Tôi đã đủ 18 tuổi và là công dân cư trú tại Việt Nam.</label>
        </div>

        <button type="button" id="submitBtn" disabled>
            <div class="spinner" id="spinner"></div>
            <span id="btnText">ĐĂNG KÝ</span>
        </button>
    </form>
</div>

<script>
    // Elements
    const form = document.getElementById('registrationForm');
    const fullName = document.getElementById('fullName');
    const dob = document.getElementById('dob');
    const address = document.getElementById('address');
    const phone = document.getElementById('phone');
    const email = document.getElementById('email');
    const cccd = document.getElementById('cccd');
    const terms = document.getElementById('terms');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');

    // Chặn ngày tương lai cho Date Picker
    const todayStr = new Date().toISOString().split('T')[0];
    dob.setAttribute('max', todayStr);

    // Tính tuổi
    function calculateAge(birthdayStr) {
        const birthday = new Date(birthdayStr);
        const today = new Date();
        let age = today.getFullYear() - birthday.getFullYear();
        const m = today.getMonth() - birthday.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthday.getDate())) {
            age--;
        }
        return age;
    }

    // Hiển thị / Ẩn lỗi
    function showError(element, errorId, message, show) {
        const errorEl = document.getElementById(errorId);
        if (show) {
            element.classList.add('input-error');
            errorEl.style.display = 'block';
            if(message) errorEl.textContent = message;
        } else {
            element.classList.remove('input-error');
            errorEl.style.display = 'none';
        }
    }

    // --- CÁC HÀM VALIDATE CHI TIẾT ---

    // 1. Validate Họ tên
    fullName.addEventListener('input', function() {
        this.value = this.value.toUpperCase(); // Auto Uppercase
        // Loại bỏ ký tự số và ký tự đặc biệt
        this.value = this.value.replace(/[^a-zA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚĂĐĨŨƠàáâãèéêìíòóôõùúăđĩũơƯĂẠẢẤẦẨẪẬẮẰẲẴẶẸẺẼỀỀỂưăạảấầẩẫậắằẳẵặẹẻẽềềểỄỆỈỊỌỎỐỒỔỖỘỚỜỞỠỢỤỦỨỪễệỉịọỏốồổỗộớờởỡợụủứừỮỰỲỴÝỶỸửữựỳỵỷỹ\s]/g, '');
        validateForm();
    });
    fullName.addEventListener('blur', function() {
        this.value = this.value.trim(); // Auto Trim
        validateForm();
    });
    function isFullNameValid() {
        const val = fullName.value.trim();
        if (!val) {
            showError(fullName, 'error-fullName', 'Họ tên không được để trống.', true);
            return false;
        }
        showError(fullName, 'error-fullName', '', false);
        return true;
    }

    // 2. Validate Ngày sinh (> 15 tuổi)
    dob.addEventListener('input', validateForm);
    function isDobValid() {
        if (!dob.value) {
            showError(dob, 'error-dob', 'Vui lòng chọn ngày sinh.', true);
            return false;
        }
        const age = calculateAge(dob.value);
        if (age <= 15) {
            showError(dob, 'error-dob', 'Bạn phải trên 15 tuổi để đăng ký.', true);
            return false;
        }
        showError(dob, 'error-dob', '', false);
        return true;
    }

    // 3. Validate Địa chỉ
    address.addEventListener('input', validateForm);
    function isAddressValid() {
        const val = address.value.trim();
        if (val.length < 10) {
            showError(address, 'error-address', 'Vui lòng nhập địa chỉ cụ thể (tối thiểu 10 ký tự).', true);
            return false;
        }
        showError(address, 'error-address', '', false);
        return true;
    }

    // 4. Validate Số điện thoại
    phone.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, ''); // Chỉ cho nhập số
        validateForm();
    });
    function isPhoneValid() {
        const regexPhone = /^0[3|5|7|8|9][0-9]{8}$/;
        if (!regexPhone.test(phone.value)) {
            showError(phone, 'error-phone', 'Số điện thoại không hợp lệ.', true);
            return false;
        }
        showError(phone, 'error-phone', '', false);
        return true;
    }

    // 5. Validate Email (Optional)
    email.addEventListener('input', validateForm);
    function isEmailValid() {
        const val = email.value.trim();
        if (!val) {
            showError(email, 'error-email', '', false);
            return true; // Không bắt buộc
        }
        const regexEmail = /^[a-z0-9]+@[a-z]+\.[a-z]{2,3}$/;
        if (!regexEmail.test(val)) {
            showError(email, 'error-email', 'Định dạng email không chính xác.', true);
            return false;
        }
        showError(email, 'error-email', '', false);
        return true;
    }

    // 6. Validate CCCD
    cccd.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, ''); // Chỉ cho nhập số
        showError(cccd, 'error-cccd', '', false); // Xóa lỗi UI khi đang gõ
        validateForm();
    });
    function isCccdValid() {
        if (cccd.value.length !== 10) {
            showError(cccd, 'error-cccd', 'CCCD phải đủ 10 số.', true);
            return false;
        }
        // Lưu ý: Lỗi trùng CCCD sẽ được check khi submit hoặc blur, không chặn cứng ở Logic nút bấm.
        showError(cccd, 'error-cccd', '', false); 
        return true;
    }

    // Lắng nghe thay đổi checkbox Cam kết
    terms.addEventListener('change', validateForm);

    // --- BỘ LẮNG NGHE KIỂM TRA TRẠNG THÁI NÚT (EVENT LISTENER) ---
    function validateForm() {
        const vName = isFullNameValid();
        const vDob = isDobValid();
        const vAddress = isAddressValid();
        const vPhone = isPhoneValid();
        const vEmail = isEmailValid();
        const vCccd = isCccdValid();
        const vTerms = terms.checked;

        // Logic AND 6 điều kiện bắt buộc
        if (vName && vDob && vAddress && vPhone && vCccd && vTerms && vEmail) {
            submitBtn.disabled = false;
        } else {
            submitBtn.disabled = true;
        }
    }

    // --- XỬ LÝ SỰ KIỆN CLICK SUBMIT ---
    submitBtn.addEventListener('click', function() {
        // 1. Quản trị xung đột nghiệp vụ: Kiểm tra tuổi >= 18 khi đã tích cam kết
        const age = calculateAge(dob.value);
        if (age < 18) {
            alert("Giao dịch từ chối: Ngày sinh của quý khách không khớp với cam kết đã đủ 18 tuổi. Vui lòng mang giấy tờ ra Quầy giao dịch để được hỗ trợ mở tài khoản.");
            return;
        }

        // 2. Chuyển trạng thái UI sang Loading (Chặn spam click)
        submitBtn.disabled = true;
        spinner.style.display = 'block';
        btnText.textContent = 'ĐANG XỬ LÝ...';

        // 3. Giả lập gọi API (setTimeout)
        setTimeout(() => {
            // Giả lập Luồng ngoại lệ 1: CCCD bị trùng
            if (cccd.value === '1234567890') {
                showError(cccd, 'error-cccd', 'Căn cước công dân này đã được sử dụng. Nếu đây là lỗi, vui lòng liên hệ Hotline 1900xxxx.', true);
                resetButton();
            } else {
                // Giả lập Luồng thành công
                alert("Đăng ký thông tin thành công! Đang chuyển hướng sang Xác thực OTP...");
                resetButton();
                // window.location.href = '/otp-verification'; // Chuyển trang thực tế
            }
        }, 2000); // Trễ 2 giây
    });

    function resetButton() {
        submitBtn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'ĐĂNG KÝ';
    }
</script>

</body>
</html>

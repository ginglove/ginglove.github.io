<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So sánh Phương pháp: Có vs Không có Test Condition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* CSS cho Flip Card */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .group:hover .group-hover\:rotate-y-180 { transform: rotateY(180deg); }
        
        /* Hiệu ứng Shake cho thẻ lỗi */
        .hover-shake:hover { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-8 flex items-center justify-center">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState } = React;

        const comparisonData = [
            {
                aspect: "Độ bao phủ (Coverage)",
                bad: { title: "Dễ sót lỗi (Missed Bugs)", desc: "Chỉ nghĩ ra các case phổ biến (Happy path). Quên mất các trường hợp biên, lỗi hiếm gặp.", icon: "fa-eye-slash", color: "text-red-500" },
                good: { title: "Bao quát 100% (High Coverage)", desc: "Chẻ nhỏ Requirement thành từng điều kiện. Đảm bảo mọi ngóc ngách của tính năng đều được phủ case.", icon: "fa-bullseye", color: "text-emerald-500" }
            },
            {
                aspect: "Quản lý & Bảo trì",
                bad: { title: "Rối rắm, Trùng lặp", desc: "List Test Case dài ngoằng, không phân nhóm. Khi có thay đổi requirement, không biết phải sửa từ đâu.", icon: "fa-shuffle", color: "text-red-500" },
                good: { title: "Cấu trúc rõ ràng, Dễ update", desc: "Các Test Case được nhóm theo Condition. Khi requirement đổi, chỉ cần tìm đúng Condition đó để cập nhật.", icon: "fa-sitemap", color: "text-emerald-500" }
            },
            {
                aspect: "Góc nhìn Tư duy",
                bad: { title: "Tư duy Người dùng cuối (User)", desc: "Nhìn giao diện và nghĩ 'Mình sẽ thao tác gì tiếp theo?' -> Thiếu tính kỹ thuật và hệ thống.", icon: "fa-user", color: "text-red-500" },
                good: { title: "Tư duy Kỹ sư QA (QA Engineer)", desc: "Phân tích Logic, Data, Business Rules trước khi nghĩ đến thao tác nhập liệu.", icon: "fa-brain", color: "text-emerald-500" }
            }
        ];

        function App() {
            return (
                <div className="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                    
                    {/* Header */}
                    <div className="bg-slate-800 text-white p-8 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10" style={{ backgroundImage: 'radial-gradient(circle, #ffffff 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                        <h1 className="text-3xl lg:text-4xl font-extrabold tracking-wide relative z-10 mb-3">
                            Tại sao phải viết <span className="text-amber-400">Test Condition</span> trước?
                        </h1>
                        <p className="text-slate-300 text-lg relative z-10 max-w-2xl mx-auto">
                            Sự khác biệt giữa một "Thợ viết Test Case" và một Kỹ sư Kiểm thử chuyên nghiệp.
                        </p>
                    </div>

                    {/* Main Content */}
                    <div className="p-8">
                        
                        {/* Two Columns Layout */}
                        <div className="flex flex-col lg:flex-row gap-8 mb-12">
                            
                            {/* Cột BAD */}
                            <div className="flex-1 perspective-1000">
                                <div className="bg-red-50 rounded-2xl border border-red-200 p-6 h-full hover-shake transition-all duration-300">
                                    <div className="flex items-center gap-4 mb-6 pb-4 border-b border-red-200">
                                        <div className="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center text-red-500 text-2xl shadow-sm">
                                            <i className="fa-solid fa-person-falling"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-red-800 uppercase tracking-wide">Làm Tắt (Đi Tắt Đón Đầu)</h2>
                                            <p className="text-red-600 font-medium">Requirement ➔ Cắm đầu viết Test Case</p>
                                        </div>
                                    </div>
                                    
                                    <div className="space-y-4 relative">
                                         {/* Đường vẽ gạch chéo */}
                                         <div className="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none z-0">
                                            <i className="fa-solid fa-xmark text-9xl text-red-500"></i>
                                         </div>
                                        
                                        <div className="bg-white p-4 rounded-xl shadow-sm border border-red-100 relative z-10">
                                            <p className="text-sm text-slate-600 mb-2 italic">Suy nghĩ trong đầu:</p>
                                            <ul className="text-slate-800 space-y-2 font-medium">
                                                <li><i className="fa-regular fa-square-minus text-red-400 mr-2"></i> Case 1: Nhập đúng pass -> OK</li>
                                                <li><i className="fa-regular fa-square-minus text-red-400 mr-2"></i> Case 2: Nhập sai pass -> Lỗi</li>
                                                <li><i className="fa-regular fa-square-minus text-red-400 mr-2"></i> Case 3: Để trống -> Lỗi</li>
                                                <li className="text-red-500 font-bold">... Rồi sao nữa? Hết ý tưởng! ⚠️</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Cột GOOD */}
                            <div className="flex-1 perspective-1000">
                                <div className="bg-emerald-50 rounded-2xl border border-emerald-200 p-6 h-full transition-all duration-300 hover:shadow-xl hover:-translate-y-2">
                                    <div className="flex items-center gap-4 mb-6 pb-4 border-b border-emerald-200">
                                        <div className="w-16 h-16 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 text-2xl shadow-sm relative">
                                            <i className="fa-solid fa-layer-group"></i>
                                            <div className="absolute -top-1 -right-1 text-yellow-500 text-sm animate-bounce"><i className="fa-solid fa-star"></i></div>
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-emerald-800 uppercase tracking-wide">Chuẩn ISTQB</h2>
                                            <p className="text-emerald-600 font-medium">Req ➔ <span className="font-bold underline">Test Condition</span> ➔ Test Case</p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-emerald-100">
                                        <p className="text-sm text-slate-600 mb-3 italic">Tư duy phân nhóm:</p>
                                        
                                        <div className="space-y-3">
                                            <div className="bg-slate-50 p-2 rounded border-l-2 border-amber-400">
                                                <p className="font-bold text-sm text-slate-700">1. Điều kiện: Check Validation Form</p>
                                                <p className="text-xs text-slate-500 pl-2">↳ TC: Bỏ trống, Nhập ký tự lạ, Vượt quá max length...</p>
                                            </div>
                                            <div className="bg-slate-50 p-2 rounded border-l-2 border-blue-400">
                                                <p className="font-bold text-sm text-slate-700">2. Điều kiện: Check Logic Business</p>
                                                <p className="text-xs text-slate-500 pl-2">↳ TC: Tài khoản VIP, Tài khoản bị khóa, Mật khẩu cũ...</p>
                                            </div>
                                            <div className="bg-slate-50 p-2 rounded border-l-2 border-purple-400">
                                                <p className="font-bold text-sm text-slate-700">3. Điều kiện: Check Bảo mật</p>
                                                <p className="text-xs text-slate-500 pl-2">↳ TC: SQL Injection, Brute force, Hết hạn Session...</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* Comparison Table / Grid */}
                        <h3 className="text-2xl font-bold text-center text-slate-800 mb-8 border-b-2 inline-block mx-auto border-indigo-200 pb-2">Bảng Phân Tích Chi Tiết</h3>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {comparisonData.map((item, index) => (
                                <div key={index} className="bg-slate-50 rounded-xl p-5 border border-slate-200 shadow-sm relative overflow-hidden group">
                                    
                                    {/* Aspect Label */}
                                    <div className="absolute top-0 right-0 bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-bl-lg">
                                        {item.aspect}
                                    </div>

                                    <div className="mt-4 space-y-4">
                                        {/* Bad side */}
                                        <div className="flex items-start gap-3 opacity-60 group-hover:opacity-100 transition-opacity">
                                            <i className={`fa-solid fa-circle-xmark mt-1 text-red-400`}></i>
                                            <div>
                                                <p className="font-bold text-slate-700 text-sm">Đi tắt:</p>
                                                <p className="text-sm text-slate-600">{item.bad.desc}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="border-t border-slate-200 border-dashed"></div>

                                        {/* Good side */}
                                        <div className="flex items-start gap-3">
                                            <i className={`fa-solid fa-circle-check mt-1 text-emerald-500`}></i>
                                            <div>
                                                <p className="font-bold text-emerald-700 text-sm">Có Condition:</p>
                                                <p className="text-sm text-slate-800 font-medium">{item.good.desc}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

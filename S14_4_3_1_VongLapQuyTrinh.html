<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng lặp Quy trình: Thiết kế Test Condition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        
        .node-circle {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .node-active {
            transform: scale(1.15);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            z-index: 20;
        }
        .node-inactive {
            transform: scale(0.95);
            opacity: 0.6;
            filter: grayscale(40%);
            z-index: 10;
        }
        .node-inactive:hover {
            opacity: 0.9;
            transform: scale(1.05);
            filter: grayscale(0%);
        }

        /* SVG animation paths */
        .path-bg { stroke: #e2e8f0; stroke-width: 6; fill: none; }
        .path-active { 
            stroke-width: 6; 
            fill: none; 
            stroke-linecap: round;
            stroke-dasharray: 800;
            stroke-dashoffset: 800;
            animation: dashDraw 1.5s ease-out forwards;
        }
        
        @keyframes dashDraw {
            to { stroke-dashoffset: 0; }
        }

        /* Float animation for the center text */
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* Fade in for right content */
        .fade-enter {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-4 lg:p-8 min-h-screen flex items-center justify-center">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const cycleSteps = [
            {
                id: 1,
                title: "Đọc SRS",
                short: "Phân tích tài liệu",
                icon: "fa-book-open-reader",
                color: "bg-blue-500",
                textColor: "text-blue-600",
                ringColor: "ring-blue-300",
                angle: -90, // Top
                content: "Tiếp nhận tài liệu Yêu cầu phần mềm (SRS). Đọc lướt để hiểu ngữ cảnh, đọc kỹ để bóc tách các quy tắc (Rules) và ranh giới hệ thống.",
                actions: [
                    "Định vị các thành phần UI (Form, Nút bấm, Bảng).",
                    "Định vị Data Rules (Độ dài, Bắt buộc, Kiểu dữ liệu).",
                    "Vẽ Flowchart cơ bản trong đầu hoặc ra giấy."
                ],
                teacherTip: "Hãy coi SRS là bản đồ kho báu. Đừng vội đào (viết code/test) khi chưa xem kỹ bản đồ."
            },
            {
                id: 2,
                title: "Q&A",
                short: "Hỏi & Đáp",
                icon: "fa-comments",
                color: "bg-amber-500",
                textColor: "text-amber-600",
                ringColor: "ring-amber-300",
                angle: 0, // Right
                content: "Quá trình giao tiếp với BA/Khách hàng để làm rõ những điểm mâu thuẫn, thiếu sót hoặc mơ hồ phát hiện được trong bước Đọc.",
                actions: [
                    "Không tự ý suy diễn (Don't assume).",
                    "Ghi nhận Q&A thành văn bản có người xác nhận (Log).",
                    "Chốt lại một 'Sự thấu hiểu chung' (Shared Understanding)."
                ],
                teacherTip: "Tester xịn là người đặt câu hỏi khiến BA phải giật mình sửa lại tài liệu, chứ không phải người nhắm mắt làm ngơ."
            },
            {
                id: 3,
                title: "Positive",
                short: "Viết luồng Đúng",
                icon: "fa-circle-check",
                color: "bg-emerald-500",
                textColor: "text-emerald-600",
                ringColor: "ring-emerald-300",
                angle: 90, // Bottom
                content: "Thiết kế các Test Condition cho luồng hợp lệ (Happy Path). Chứng minh rằng phần mềm đáp ứng được mục tiêu cốt lõi của người dùng.",
                actions: [
                    "Xác nhận hệ thống hoạt động đúng khi input chuẩn.",
                    "Kiểm tra luồng lưu dữ liệu vào Database thành công.",
                    "Ưu tiên cao nhất: Nếu Happy Path chết, không cần test các lỗi nhỏ khác."
                ],
                teacherTip: "Khách hàng trả tiền để mua 'Happy Path'. Phải đảm bảo tính năng chạy được trước khi tìm cách phá nó."
            },
            {
                id: 4,
                title: "Negative",
                short: "Viết luồng Sai",
                icon: "fa-bug",
                color: "bg-rose-500",
                textColor: "text-rose-600",
                ringColor: "ring-rose-300",
                angle: 180, // Left
                content: "Tấn công hệ thống bằng các trường hợp lỗi, ngoại lệ, giá trị biên, hành vi bất thường để kiểm tra sức chịu đựng và khả năng phòng thủ.",
                actions: [
                    "Test thiếu dữ liệu, sai định dạng (Validation).",
                    "Test biên (Boundary values).",
                    "Test bảo mật cơ bản, giới hạn hệ thống (Timeouts)."
                ],
                teacherTip: "Lưu ý mũi tên quay lại! Khi nghĩ ra một kịch bản Negative quá 'dị' mà SRS chưa lường tới, bạn lại phải vòng về bước Q&A để hỏi BA!"
            }
        ];

        function App() {
            const [activeStep, setActiveStep] = useState(1);
            const [isPlaying, setIsPlaying] = useState(false);

            // Auto play logic
            useEffect(() => {
                let timer;
                if (isPlaying) {
                    timer = setInterval(() => {
                        setActiveStep(prev => prev === 4 ? 1 : prev + 1);
                    }, 3000); // 3 seconds per step
                }
                return () => clearInterval(timer);
            }, [isPlaying]);

            const currentData = cycleSteps.find(s => s.id === activeStep);

            // Hàm tính toán vị trí X, Y trên đường tròn (Bán kính = 140)
            const getCoordinates = (angle) => {
                const radius = 140;
                const radian = (angle * Math.PI) / 180;
                return {
                    x: 200 + radius * Math.cos(radian), // 200 là tâm X
                    y: 200 + radius * Math.sin(radian)  // 200 là tâm Y
                };
            };

            // SVG Path Generator cho viền cong
            const generateArc = (startAngle, endAngle) => {
                const start = getCoordinates(startAngle);
                const end = getCoordinates(endAngle);
                // Tạo một cung tròn đi qua các điểm
                const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                return `M ${start.x} ${start.y} A 140 140 0 ${largeArcFlag} 1 ${end.x} ${end.y}`;
            };

            return (
                <div className="w-full bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden flex flex-col">
                    
                    {/* Header */}
                    <div className="bg-slate-800 text-white p-6 flex flex-col sm:flex-row justify-between items-center gap-4 relative">
                        <div>
                            <h1 className="text-2xl font-extrabold tracking-wide uppercase">
                                <span className="text-indigo-400">Vòng lặp Phân tích</span> Test Condition
                            </h1>
                            <p className="text-slate-300 text-sm mt-1">Chu trình khép kín giúp Tester không bỏ sót Case</p>
                        </div>
                        <button 
                            onClick={() => setIsPlaying(!isPlaying)}
                            className={`px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all shadow-md
                                ${isPlaying ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'}`}
                        >
                            <i className={`fa-solid ${isPlaying ? 'fa-pause' : 'fa-play'}`}></i>
                            {isPlaying ? 'Dừng Tự động' : 'Tự động chạy (Auto)'}
                        </button>
                    </div>

                    <div className="flex flex-col lg:flex-row min-h-[500px]">
                        
                        {/* LEFT: Circular Diagram Area */}
                        <div className="w-full lg:w-1/2 p-8 bg-slate-50 relative flex items-center justify-center border-r border-slate-200">
                            
                            <div className="relative w-[400px] h-[400px]">
                                {/* SVG Background Circle & Progress */}
                                <svg className="absolute inset-0 w-full h-full transform -rotate-90">
                                    {/* Vòng nền xám */}
                                    <circle cx="200" cy="200" r="140" className="path-bg" />
                                    
                                    {/* Mũi tên cong chạy theo active node */}
                                    {activeStep > 1 && <path d={generateArc(0, (activeStep - 1) * 90)} className="path-active" stroke={currentData.color.replace('bg-', '')} />}
                                    
                                    {/* Vòng tuần hoàn (đặc biệt cho bước 4 quay lại 1) */}
                                    {activeStep === 4 && (
                                        <path d={generateArc(270, 350)} stroke="#f43f5e" className="path-active" strokeDasharray="10,5" opacity="0.5"/>
                                    )}
                                </svg>

                                {/* Center Label */}
                                <div className="absolute inset-0 flex flex-col items-center justify-center float-anim pointer-events-none">
                                    <i className="fa-solid fa-arrows-spin text-4xl text-slate-300 mb-2"></i>
                                    <span className="font-black text-slate-400 tracking-widest text-sm">ITERATION</span>
                                    <span className="text-xs text-slate-400 font-medium">(Tính lặp lại)</span>
                                </div>

                                {/* Nodes rendering */}
                                {cycleSteps.map((step) => {
                                    const coords = getCoordinates(step.angle);
                                    const isActive = step.id === activeStep;
                                    
                                    return (
                                        <div 
                                            key={step.id}
                                            onClick={() => { setActiveStep(step.id); setIsPlaying(false); }}
                                            className={`absolute flex flex-col items-center justify-center node-circle
                                                ${isActive ? 'node-active' : 'node-inactive'}`}
                                            style={{ 
                                                left: coords.x - 48, // offset by half width (96/2)
                                                top: coords.y - 48,  // offset by half height (96/2)
                                                width: '96px', height: '96px'
                                            }}
                                        >
                                            <div className={`w-16 h-16 rounded-full flex items-center justify-center text-2xl text-white shadow-lg mb-1 relative
                                                ${step.color} ${isActive ? `ring-4 ${step.ringColor}` : ''}`}>
                                                <i className={`fa-solid ${step.icon}`}></i>
                                                {isActive && (
                                                    <span className="absolute -top-1 -right-1 bg-white text-slate-800 w-5 h-5 rounded-full text-xs font-bold flex items-center justify-center border shadow-sm">
                                                        {step.id}
                                                    </span>
                                                )}
                                            </div>
                                            <div className="bg-white/80 backdrop-blur px-2 py-0.5 rounded shadow-sm">
                                                <p className={`text-xs font-bold text-center ${isActive ? step.textColor : 'text-slate-600'}`}>{step.title}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                        </div>

                        {/* RIGHT: Detail Content Panel */}
                        <div className="w-full lg:w-1/2 p-8 lg:p-12 bg-white flex flex-col justify-center">
                            
                            <div key={activeStep} className="fade-enter">
                                {/* Header của thẻ chi tiết */}
                                <div className="flex items-center gap-4 mb-6 pb-6 border-b-2 border-slate-100">
                                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-3xl text-white shadow-lg ${currentData.color}`}>
                                        <i className={`fa-solid ${currentData.icon}`}></i>
                                    </div>
                                    <div>
                                        <span className="text-sm font-bold text-slate-400 tracking-wider uppercase">Bước {currentData.id}</span>
                                        <h2 className={`text-3xl font-black ${currentData.textColor}`}>
                                            {currentData.title}
                                        </h2>
                                        <p className="text-slate-500 font-medium">{currentData.short}</p>
                                    </div>
                                </div>

                                {/* Main Description */}
                                <p className="text-lg text-slate-700 leading-relaxed font-medium mb-8">
                                    {currentData.content}
                                </p>

                                {/* Actionable List */}
                                <div className="bg-slate-50 rounded-xl p-6 border border-slate-100 mb-8">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-4 uppercase text-sm">
                                        <i className="fa-solid fa-list-check text-slate-400"></i>
                                        Hành động cụ thể:
                                    </h3>
                                    <ul className="space-y-3">
                                        {currentData.actions.map((action, idx) => (
                                            <li key={idx} className="flex items-start gap-3">
                                                <div className={`mt-1 flex-shrink-0 w-2 h-2 rounded-full ${currentData.color}`}></div>
                                                <span className="text-slate-700">{action}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Teacher's corner */}
                                <div className={`p-5 rounded-xl border-l-4 flex gap-4 items-start
                                    ${currentData.color.replace('bg-', 'bg-').replace('500', '50')}
                                    ${currentData.color.replace('bg-', 'border-')}
                                `}>
                                    <i className={`fa-solid fa-lightbulb text-2xl mt-1 ${currentData.textColor}`}></i>
                                    <div>
                                        <p className={`font-bold mb-1 text-sm ${currentData.textColor}`}>Lời khuyên cho Học viên:</p>
                                        <p className="text-slate-700 italic">"{currentData.teacherTip}"</p>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Nút điều hướng thủ công */}
                            <div className="flex justify-between mt-8 pt-6 border-t border-slate-100">
                                <button 
                                    onClick={() => { setActiveStep(prev => prev === 1 ? 4 : prev - 1); setIsPlaying(false); }}
                                    className="px-4 py-2 rounded-lg text-slate-500 hover:bg-slate-100 transition-colors font-medium text-sm flex items-center gap-2"
                                >
                                    <i className="fa-solid fa-arrow-left"></i> Bước trước
                                </button>
                                <button 
                                    onClick={() => { setActiveStep(prev => prev === 4 ? 1 : prev + 1); setIsPlaying(false); }}
                                    className="px-4 py-2 rounded-lg text-indigo-600 hover:bg-indigo-50 font-bold transition-colors text-sm flex items-center gap-2"
                                >
                                    Bước tiếp theo <i className="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ Phân tích Requirement</title>
    
    <!-- Nhúng Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Nhúng React và ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Nhúng Babel để chạy JSX trong trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Hiệu ứng nhấp nháy cho đường nối */
        .path-pulse { animation: pulsePath 2s infinite; }
        @keyframes pulsePath {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Icons
        const FileText = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
        );
        const LayoutDatabase = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        );
        const GitCommit = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg>
        );
        const SearchX = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m13.5 8.5-5 5"/><path d="m8.5 8.5 5 5"/><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        );
        const Lightbulb = ({ className }) => (
            <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        );

        function App() {
            const [activeStep, setActiveStep] = useState(0);

            const steps = [
                {
                    id: 0,
                    title: "Đọc Text (Nắm bối cảnh)",
                    shortDesc: "Đọc thô để hiểu tổng quan",
                    icon: <FileText className="w-7 h-7" />,
                    color: "bg-blue-500",
                    ring: "ring-blue-300",
                    border: "border-blue-500",
                    bgLight: "bg-blue-50",
                    content: "Bước đầu tiên là đọc lướt toàn bộ tài liệu để lấy bối cảnh chung (Context), sau đó đọc kỹ lại từng dòng. Ở bước này, khoan hãy nghĩ đến code hay test, chỉ tập trung hiểu nghiệp vụ.",
                    tips: [
                        "Gạch chân các từ khóa: 'Bắt buộc', 'Tùy chọn', 'Chỉ khi'.",
                        "Xác định rõ ngữ cảnh: Tính năng này làm ra để giải quyết nỗi đau (pain-point) gì cho User?",
                        "Lưu ý các thuật ngữ chuyên ngành (Domain Knowledge) chưa hiểu để hỏi lại BA."
                    ],
                    question: "Giảng viên hỏi học viên: 'Nếu gặp một từ viết tắt trong tài liệu mà không được giải thích, các bạn sẽ làm gì tiếp theo?'"
                },
                {
                    id: 1,
                    title: "Bóc tách UI / Data",
                    shortDesc: "Phân loại yếu tố nhìn thấy & ẩn giấu",
                    icon: <LayoutDatabase className="w-7 h-7" />,
                    color: "bg-purple-500",
                    ring: "ring-purple-300",
                    border: "border-purple-500",
                    bgLight: "bg-purple-50",
                    content: "Biến các đoạn văn bản thành các thành phần cụ thể. Tách bạch rõ ràng đâu là thứ hiển thị trên màn hình (UI) và đâu là dữ liệu chạy ngầm bên dưới (Data).",
                    tips: [
                        "Về UI: Nút bấm ở đâu? Form có bao nhiêu trường? Message báo lỗi hiển thị thế nào?",
                        "Về Data: Kiểu dữ liệu là gì (Text, Số, Ngày tháng)? Độ dài tối đa? Ràng buộc (Validation) ra sao?",
                        "Sử dụng bảng (Table) hoặc Mindmap để liệt kê (Ví dụ: Tên trường | Kiểu dữ liệu | Bắt buộc | Ghi chú)."
                    ],
                    question: "Thực hành nhanh: 'Đọc câu này: (Mật khẩu phải từ 8 ký tự, có chữ hoa và số). Đâu là UI, đâu là Data Constraint?'"
                },
                {
                    id: 2,
                    title: "Phác thảo Luồng (Flow)",
                    shortDesc: "Vẽ sơ đồ tư duy hành vi",
                    icon: <GitCommit className="w-7 h-7" />,
                    color: "bg-orange-500",
                    ring: "ring-orange-300",
                    border: "border-orange-500",
                    bgLight: "bg-orange-50",
                    content: "Tài liệu thường viết theo dạng liệt kê, nhưng hệ thống hoạt động theo trình tự. Phải nối các UI/Data ở bước 2 thành một dòng chảy (Flow) có điểm bắt đầu và kết thúc.",
                    tips: [
                        "Vẽ ra giấy/bảng luồng đi chuẩn (Happy Path) trước: A -> B -> C -> Thành công.",
                        "Từ luồng chuẩn, rẽ nhánh ra các luồng thay thế (Alternative): Nếu ở B chọn 'Quên mật khẩu' thì đi đâu?",
                        "Xác định rõ các điểm quyết định (Decision Points - hình thoi trong Flowchart)."
                    ],
                    question: "Giảng viên gợi ý: 'Các em hãy dùng bút và giấy, vẽ lại bằng hình khối thay vì đọc lại text cho luồng Đăng nhập.' "
                },
                {
                    id: 3,
                    title: "Tìm Lỗ hổng (Loopholes)",
                    shortDesc: "Đóng vai thám tử bắt lỗi requirement",
                    icon: <SearchX className="w-7 h-7" />,
                    color: "bg-red-500",
                    ring: "ring-red-300",
                    border: "border-red-500",
                    bgLight: "bg-red-50",
                    content: "Đây là bước thể hiện giá trị của kỹ sư. Requirement hiếm khi hoàn hảo. Hãy dùng tư duy phản biện (Critical Thinking) để tấn công vào bản phác thảo ở Bước 3.",
                    tips: [
                        "Hỏi câu thần chú: 'Điều gì xảy ra nếu...?' (What if...?)",
                        "Các ngoại lệ phổ biến: Mất mạng giữa chừng, click đúp nhiều lần, nhập dữ liệu dị (Emoji, script), hết hạn session.",
                        "Tìm các luồng bị 'cụt' (dead-ends): Người dùng làm xong bước 3 nhưng không có nút quay lại bước 2 thì sao?"
                    ],
                    question: "Giảng viên chốt hạ: 'Tài liệu không cấm không có nghĩa là được phép làm. Hãy tự đặt câu hỏi và ghi lại thành danh sách Q&A gửi lại cho BA.'"
                }
            ];

            const currentData = steps[activeStep];

            return (
                <div className="min-h-screen flex flex-col p-6 lg:p-12 font-sans">
                    <header className="mb-10 text-center">
                        <h1 className="text-3xl font-extrabold text-slate-800 uppercase tracking-wide">
                            Quy trình Phân tích Tài liệu <span className="text-indigo-600">Requirement</span>
                        </h1>
                        <p className="text-slate-500 mt-2 font-medium">Bí kíp đọc hiểu từ góc nhìn Tester / Developer</p>
                    </header>

                    <div className="max-w-6xl w-full mx-auto flex flex-col lg:flex-row gap-10">
                        
                        {/* LEFT: Flowchart Timeline */}
                        <div className="w-full lg:w-2/5 flex flex-col items-center lg:items-start relative">
                            {/* Đường nối dọc ở background */}
                            <div className="absolute left-1/2 lg:left-8 top-10 bottom-10 w-1 bg-slate-200 -z-10 rounded-full"></div>
                            
                            {/* Line progress màu sắc */}
                            <div 
                                className="absolute left-1/2 lg:left-8 top-10 w-1 transition-all duration-500 ease-out -z-10 rounded-full bg-slate-400 path-pulse"
                                style={{ 
                                    height: `${(activeStep / (steps.length - 1)) * 100}%`,
                                    background: `linear-gradient(to bottom, #3b82f6, ${steps[activeStep].color.replace('bg-','')})` 
                                }}
                            ></div>

                            <div className="w-full space-y-6">
                                {steps.map((step, index) => {
                                    const isActive = activeStep === index;
                                    const isPassed = activeStep > index;
                                    
                                    return (
                                        <div 
                                            key={step.id} 
                                            onClick={() => setActiveStep(index)}
                                            className={`relative flex items-center gap-6 p-4 rounded-xl cursor-pointer transition-all duration-300 transform group
                                                ${isActive ? 'bg-white shadow-xl scale-105 ml-2 lg:ml-4 border border-slate-100' : 'hover:bg-slate-50 opacity-70 hover:opacity-100'}`}
                                        >
                                            {/* Nút tròn */}
                                            <div className={`flex-shrink-0 w-16 h-16 rounded-full flex items-center justify-center text-white transition-all duration-300 z-10
                                                ${isActive || isPassed ? step.color : 'bg-slate-300'}
                                                ${isActive ? `ring-4 ${step.ring} shadow-lg` : 'group-hover:scale-110'}
                                            `}>
                                                {step.icon}
                                            </div>
                                            
                                            {/* Text */}
                                            <div>
                                                <h3 className={`font-bold text-lg ${isActive ? 'text-slate-800' : 'text-slate-500'}`}>
                                                    Bước {index + 1}: {step.title}
                                                </h3>
                                                <p className="text-sm text-slate-400">{step.shortDesc}</p>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                        {/* RIGHT: Detail Content Panel */}
                        <div className="w-full lg:w-3/5">
                            <div 
                                key={activeStep} /* Force re-render animation */
                                className={`h-full bg-white rounded-2xl shadow-xl border-t-8 p-8 flex flex-col animate-fade-in ${currentData.border}`}
                            >
                                <div className="flex items-center gap-4 mb-6">
                                    <div className={`p-3 rounded-lg text-white ${currentData.color}`}>
                                        {currentData.icon}
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-800">
                                        {currentData.title}
                                    </h2>
                                </div>

                                <p className="text-lg text-slate-600 mb-8 leading-relaxed font-medium">
                                    {currentData.content}
                                </p>

                                {/* List of Tips */}
                                <div className={`${currentData.bgLight} rounded-xl p-6 border border-slate-100 mb-8 flex-grow`}>
                                    <h3 className="font-bold flex items-center gap-2 text-slate-800 mb-4 text-lg">
                                        <Lightbulb className="w-5 h-5 text-yellow-500" />
                                        Hành động cụ thể:
                                    </h3>
                                    <ul className="space-y-4">
                                        {currentData.tips.map((tip, idx) => (
                                            <li key={idx} className="flex items-start gap-3">
                                                <div className={`mt-1 flex-shrink-0 w-2 h-2 rounded-full ${currentData.color}`}></div>
                                                <span className="text-slate-700">{tip}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Instructor Prompt Area */}
                                <div className="bg-slate-800 rounded-xl p-5 border-l-4 border-indigo-500 text-white flex gap-4 items-center">
                                    <div className="bg-indigo-500 p-2 rounded-full flex-shrink-0">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 9a2 2 0 0 1-2 2H6l-4 4V4c0-1.1.9-2 2-2h8a2 2 0 0 1 2 2v5Z"/><path d="M18 9h2a2 2 0 0 1 2 2v11l-4-4h-6a2 2 0 0 1-2-2v-1"/></svg>
                                    </div>
                                    <div>
                                        <p className="text-sm text-indigo-300 font-bold uppercase tracking-wider mb-1">Góc tương tác cùng Học viên</p>
                                        <p className="font-medium">{currentData.question}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

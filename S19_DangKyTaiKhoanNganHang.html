<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Tài Khoản Ngân Hàng - Testing Practice</title>
    <style>
        :root {
            --primary: #004b93;
            --error: #d9534f;
            --bg: #f5f7fa;
            --border: #ccd1d9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            user-select: none; /* Chặn bôi đen text */
        }
        .bank-card {
            background-color: #fff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 550px;
            border-top: 5px solid var(--primary);
        }
        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }
        .required::after {
            content: " *";
            color: var(--error);
        }
        input[type="text"], input[type="date"], input[type="number"], input[type="email"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .error-message {
            color: var(--error);
            font-size: 0.85em;
            margin-top: 6px;
            display: none;
        }
        .input-error {
            border-color: var(--error) !important;
            background-color: #fdf2f2;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-top: 25px;
            margin-bottom: 25px;
            font-size: 0.95em;
            line-height: 1.4;
            color: #555;
        }
        .checkbox-group input {
            margin-top: 4px;
            transform: scale(1.2);
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        button:disabled {
            background-color: #a0b4c8;
            cursor: not-allowed;
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="bank-card">
    <h2>Mở tài khoản trực tuyến</h2>
    <form id="registrationForm">
        <div class="form-group">
            <label class="required" for="fullName">Họ tên khách hàng</label>
            <input type="text" id="fullName" placeholder="VD: NGUYEN VAN A">
            <div class="error-message" id="error-fullName">Họ tên không được để trống.</div>
        </div>

        <div class="form-group">
            <label class="required" for="dob">Ngày sinh</label>
            <input type="date" id="dob">
            <div class="error-message" id="error-dob">Vui lòng chọn ngày sinh.</div>
        </div>

        <div class="form-group">
            <label class="required" for="address">Địa chỉ</label>
            <textarea id="address" placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
            <div class="error-message" id="error-address">Vui lòng nhập địa chỉ cụ thể (tối thiểu 10 ký tự).</div>
        </div>

        <div class="form-group">
            <label class="required" for="phone">Số điện thoại</label>
            <input type="number" id="phone" placeholder="VD: 0912345678">
            <div class="error-message" id="error-phone">Số điện thoại không hợp lệ.</div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="Nhập email (không bắt buộc)">
            <div class="error-message" id="error-email">Định dạng email không chính xác.</div>
        </div>

        <div class="form-group">
            <label class="required" for="cccd">Căn cước công dân</label>
            <input type="text" id="cccd" placeholder="Nhập đúng 10 số CCCD">
            <div class="error-message" id="error-cccd">CCCD phải đủ 10 số.</div>
        </div>

        <div class="form-group">
            <label for="referrer">Người giới thiệu</label>
            <input type="text" id="referrer" placeholder="Mã nhân viên hoặc SĐT (không bắt buộc)">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" checked>
            <label for="terms">Tôi đã đủ 18 tuổi và là công dân cư trú tại Việt Nam.</label>
        </div>

        <button type="button" id="submitBtn">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">ĐĂNG KÝ</span>
        </button>
    </form>
</div>

<script>

</body>
</html>

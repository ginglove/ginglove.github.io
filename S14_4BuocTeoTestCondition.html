<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ đồ 4 Bước Tạo Test Condition</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hiệu ứng mũi tên đập (pulse) */
        .arrow-pulse { animation: arrowPulse 2s infinite; }
        @keyframes arrowPulse {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(5px); opacity: 1; }
            100% { transform: translateX(0); opacity: 0.5; }
        }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8 flex flex-col items-center">
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState } = React;

        const steps = [
            {
                id: 1,
                name: "RULES",
                subtitle: "Quy tắc Nghiệp vụ",
                icon: "fa-scale-balanced",
                color: "bg-indigo-500",
                textColor: "text-indigo-600",
                borderColor: "border-indigo-500",
                bgLight: "bg-indigo-50",
                desc: "Xác định các quy định, ràng buộc (Constraints) và giới hạn mà hệ thống bắt buộc phải tuân thủ trước khi test chức năng.",
                content: [
                    "Các trường bắt buộc (Mandatory fields).",
                    "Định dạng dữ liệu (Email phải có @, SĐT chỉ chứa số).",
                    "Độ dài tối đa/tối thiểu (Mật khẩu 8-16 ký tự).",
                    "Quy tắc phân quyền (Chỉ Admin mới có nút Xóa)."
                ],
                teacherTip: "Hãy dặn học viên: 'Đừng vội test đúng/sai khi chưa biết luật chơi. Hãy gom tất cả các quy tắc nghiệp vụ thành một danh sách Conditions riêng để không bị quên.'"
            },
            {
                id: 2,
                name: "POSITIVE",
                subtitle: "Luồng Hợp Lệ",
                icon: "fa-circle-check",
                color: "bg-emerald-500",
                textColor: "text-emerald-600",
                borderColor: "border-emerald-500",
                bgLight: "bg-emerald-50",
                desc: "Thiết kế các điều kiện test chứng minh hệ thống hoạt động chính xác khi người dùng làm ĐÚNG theo mọi quy tắc (Happy Path).",
                content: [
                    "Tạo mới thành công với đầy đủ dữ liệu hợp lệ.",
                    "Lưu dữ liệu thành công vào cơ sở dữ liệu.",
                    "Chuyển hướng (Redirect) đúng trang sau khi thao tác thành công.",
                    "Hệ thống hiển thị thông báo thành công (Success Message)."
                ],
                teacherTip: "Tuyệt chiêu giảng dạy: 'Khách hàng trả tiền để tính năng chạy đúng. Nên Test Positive là bước quan trọng nhất để chứng minh giá trị của phần mềm. Hãy test Positive trước!'"
            },
            {
                id: 3,
                name: "NEGATIVE",
                subtitle: "Luồng Lỗi / Ngoại Lệ",
                icon: "fa-triangle-exclamation",
                color: "bg-rose-500",
                textColor: "text-rose-600",
                borderColor: "border-rose-500",
                bgLight: "bg-rose-50",
                desc: "Thiết kế các điều kiện test để đảm bảo hệ thống có khả năng phòng thủ, xử lý khéo léo khi người dùng làm SAI hoặc có sự cố.",
                content: [
                    "Bỏ trống các trường bắt buộc.",
                    "Nhập sai định dạng, vượt quá số ký tự cho phép.",
                    "Hành động phá hoại (Nhập mã HTML/SQL injection).",
                    "Ngoại lệ hệ thống (Mất mạng khi đang submit, hết hạn session)."
                ],
                teacherTip: "Góc nhìn QA: 'Đây là sân chơi thể hiện đẳng cấp của Tester. Một Tester giỏi sẽ tìm ra những tình huống quái oăm nhất mà người dùng có thể vô tình hoặc cố ý gây ra.'"
            },
            {
                id: 4,
                name: "UI",
                subtitle: "Giao Diện Người Dùng",
                icon: "fa-desktop",
                color: "bg-cyan-500",
                textColor: "text-cyan-600",
                borderColor: "border-cyan-500",
                bgLight: "bg-cyan-50",
                desc: "Kiểm tra các yếu tố về mặt thị giác, hiển thị và trải nghiệm người dùng (UX) so với bản thiết kế (Figma/Mockup).",
                content: [
                    "Lỗi chính tả, font chữ, kích thước chữ.",
                    "Màu sắc nút bấm, trạng thái hover/active.",
                    "Responsive (Bố cục có bị vỡ khi xem trên điện thoại không?).",
                    "Tính nhất quán (Ví dụ: Nút Hủy luôn nằm bên trái nút Lưu)."
                ],
                teacherTip: "Nhắc nhở học viên: 'Tính năng chạy đúng nhưng nút bấm bị lệch ra ngoài màn hình thì khách hàng vẫn đánh giá là phần mềm lỗi. UI/UX là bộ mặt của sản phẩm!'"
            }
        ];

        function App() {
            const [activeStep, setActiveStep] = useState(1);
            const currentData = steps.find(s => s.id === activeStep);

            return (
                <div className="w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                    
                    {/* Header */}
                    <div className="bg-slate-800 text-white p-8 text-center relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-indigo-500 rounded-full blur-3xl opacity-20 -mr-20 -mt-20"></div>
                        <h1 className="text-3xl lg:text-4xl font-extrabold tracking-wide relative z-10 mb-2">
                            Công Thức Độc Quyền: <span className="text-indigo-400">R - P - N - U</span>
                        </h1>
                        <p className="text-slate-300 text-lg relative z-10 max-w-2xl mx-auto">
                            4 Bước Tư Duy Thiết Kế Test Condition Không Bao Giờ Sót Lỗi
                        </p>
                    </div>

                    <div className="p-6 lg:p-10">
                        
                        {/* Horizontal Stepper */}
                        <div className="flex flex-col lg:flex-row items-center justify-between mb-12 gap-4 lg:gap-0">
                            {steps.map((step, index) => {
                                const isActive = step.id === activeStep;
                                
                                return (
                                    <React.Fragment key={step.id}>
                                        {/* Step Card */}
                                        <div 
                                            onClick={() => setActiveStep(step.id)}
                                            className={`relative w-full lg:w-1/4 flex flex-col items-center cursor-pointer group transition-all duration-300
                                                ${isActive ? 'scale-105' : 'hover:scale-105 opacity-70 hover:opacity-100'}`}
                                        >
                                            <div className={`w-20 h-20 rounded-2xl flex items-center justify-center text-3xl shadow-lg transition-colors duration-300
                                                ${isActive ? `${step.color} text-white ring-4 ring-offset-2 ring-${step.color.replace('bg-', '')}` : 'bg-slate-100 text-slate-500 group-hover:bg-slate-200'}`}
                                            >
                                                <i className={`fa-solid ${step.icon}`}></i>
                                            </div>
                                            
                                            <div className="text-center mt-4">
                                                <div className="text-sm font-bold text-slate-400 mb-1">BƯỚC {step.id}</div>
                                                <h3 className={`font-black text-xl tracking-tight ${isActive ? step.textColor : 'text-slate-700'}`}>
                                                    {step.name}
                                                </h3>
                                                <p className="text-sm font-medium text-slate-500 mt-1">{step.subtitle}</p>
                                            </div>

                                            {/* Active Indicator Underline */}
                                            <div className={`h-1.5 w-12 rounded-full mt-3 transition-all duration-300 ${isActive ? step.color : 'bg-transparent'}`}></div>
                                        </div>

                                        {/* Arrow between steps (only show on desktop) */}
                                        {index < steps.length - 1 && (
                                            <div className="hidden lg:flex items-center text-slate-300 text-2xl arrow-pulse px-4">
                                                <i className="fa-solid fa-arrow-right"></i>
                                            </div>
                                        )}
                                        
                                        {/* Vertical arrow for mobile */}
                                        {index < steps.length - 1 && (
                                            <div className="lg:hidden text-slate-300 text-xl my-2">
                                                <i className="fa-solid fa-arrow-down"></i>
                                            </div>
                                        )}
                                    </React.Fragment>
                                );
                            })}
                        </div>

                        {/* Detailed Content Panel */}
                        <div key={activeStep} className={`animate-fade-in rounded-2xl border-2 ${currentData.borderColor} overflow-hidden shadow-lg`}>
                            <div className="flex flex-col lg:flex-row">
                                
                                {/* Left Side: Explanation */}
                                <div className={`p-8 lg:w-3/5 ${currentData.bgLight}`}>
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className={`p-2 rounded-lg text-white ${currentData.color}`}>
                                            <i className={`fa-solid ${currentData.icon} text-xl`}></i>
                                        </div>
                                        <h2 className={`text-2xl font-extrabold ${currentData.textColor}`}>
                                            Chi tiết: {currentData.name} ({currentData.subtitle})
                                        </h2>
                                    </div>
                                    
                                    <p className="text-slate-700 text-lg mb-6 leading-relaxed font-medium">
                                        {currentData.desc}
                                    </p>

                                    <h3 className="font-bold text-slate-800 mb-3 uppercase tracking-wide text-sm flex items-center gap-2">
                                        <i className="fa-solid fa-list-check text-slate-400"></i>
                                        Các khía cạnh cần tập trung:
                                    </h3>
                                    <ul className="space-y-3">
                                        {currentData.content.map((item, idx) => (
                                            <li key={idx} className="flex items-start gap-3 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                                <i className={`fa-solid fa-check mt-1 ${currentData.textColor}`}></i>
                                                <span className="text-slate-700 font-medium">{item}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Right Side: Teacher's Corner */}
                                <div className="p-8 lg:w-2/5 bg-slate-800 text-white flex flex-col justify-center relative overflow-hidden">
                                    {/* Icon Background */}
                                    <i className={`fa-solid ${currentData.icon} absolute -bottom-10 -right-10 text-9xl opacity-10`}></i>
                                    
                                    <div className="relative z-10">
                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center text-yellow-400 text-xl">
                                                <i className="fa-solid fa-lightbulb"></i>
                                            </div>
                                            <h3 className="text-xl font-bold text-yellow-400">Góc Giảng Viên</h3>
                                        </div>
                                        
                                        <div className="bg-white/10 p-6 rounded-xl border border-white/20 backdrop-blur-sm">
                                            <i className="fa-solid fa-quote-left text-3xl text-white/20 mb-2"></i>
                                            <p className="text-lg leading-relaxed text-slate-200 font-medium italic">
                                                {currentData.teacherTip}
                                            </p>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
